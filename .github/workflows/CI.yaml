name: CI

on:
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: j178/prek-action@v2

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
    - run: npm ci
    - run: npm run build
